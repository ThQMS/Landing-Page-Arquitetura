<!-- Tema: resolve ANTES do paint p/ evitar flash de tema errado no refresh.
     Prioridade: escolha salva (localStorage) > preferência do sistema > escuro (padrão). -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('danaus-theme');
      var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      var theme = saved || (prefersLight ? 'light' : 'dark');
      if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else document.documentElement.removeAttribute('data-theme');
    } catch (e) {}
  })();
</script>

<style>
/* ============================================================
   Danaus Arquitetura — Editorial Noturno
   Paleta: carvão quente + travertino/creme + terracota + champanhe
   ============================================================ */
:root {
  --ink-0: #0d0b09;
  --ink-1: #12100d;
  --ink-2: #1a1712;
  --ink-3: #241f18;
  --clay-deep: #2e1d12;
  --clay: #432c1b;
  --clay-mid: #5f3f27;
  --clay-soft: #9c6640;
  --cream:   #ece4d5;
  --cream-2: #c2b8a4;
  --cream-3: #8a8072;
  --champagne: #c3a678;
  --bronze: #7a6144;

  --display: "Bodoni Moda", "Didot", "Times New Roman", serif;
  --serif: "Cormorant Garamond", "Times New Roman", serif;
  --sans: "Manrope", -apple-system, sans-serif;
  --gutter: clamp(20px, 4vw, 64px);
  --page-max: 1440px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:focus:not(:focus-visible) { outline: none; }
button, a { -webkit-tap-highlight-color: transparent; }
svg { max-width: 100%; }

/* Âncoras do menu não ficam escondidas atrás da navbar fixa */
section[id], header[id] { scroll-margin-top: 82px; }

/* Foco visível (acessibilidade por teclado) */
a:focus-visible, button:focus-visible { outline: 2px solid var(--champagne); outline-offset: 3px; border-radius: 2px; }

/* Impede que filhos de grid/flex estourem a largura com texto longo */
.section-head > *, .hero-meta > *, .processo-item > *, .blog-item > *, .contato-secondary > * { min-width: 0; }

html { scroll-behavior: smooth; }
html, body {
  background: var(--ink-0);
  color: var(--cream);
  font-family: var(--sans);
  font-weight: 300;
  font-size: 16px;
  line-height: 1.55;
  letter-spacing: 0.01em;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  transition: background 0.5s ease, color 0.45s ease;
}
body { min-height: 100vh; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
::selection { background: var(--clay-mid); color: var(--cream); }

/* ------------------------------------------------------------
   Section eyebrow (numeral romano + regra + label)
   ------------------------------------------------------------ */
.section-eyebrow { display: flex; align-items: center; gap: 18px; margin-bottom: 8px; }
.section-eyebrow .roman {
  font-family: var(--display); font-weight: 300; font-size: 13px;
  letter-spacing: 0.28em; color: var(--champagne);
}
.section-eyebrow .rule { width: 36px; height: 1px; background: var(--cream-3); opacity: 0.5; }
.section-eyebrow .label {
  font-family: var(--sans); font-size: 10px; font-weight: 400;
  letter-spacing: 0.36em; text-transform: uppercase; color: var(--cream-2);
}

/* ------------------------------------------------------------
   Marquee
   ------------------------------------------------------------ */
.marquee {
  position: relative; overflow: hidden; padding: 26px 0;
  border-top: 1px solid rgba(236, 228, 213, 0.14);
  border-bottom: 1px solid rgba(236, 228, 213, 0.14);
  background-color: var(--ink-1);
  box-shadow: inset 0 5px 14px rgba(0,0,0,0.4), inset 0 -5px 14px rgba(0,0,0,0.4);
  mask-image: linear-gradient(90deg, transparent 0%, #000 8%, #000 92%, transparent 100%);
  -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 8%, #000 92%, transparent 100%);
}
.marquee-track {
  display: flex; gap: 56px; white-space: nowrap;
  animation: marquee-scroll 55s linear infinite; width: max-content;
}
.marquee-item {
  display: inline-flex; align-items: center; gap: 18px;
  font-family: var(--display); font-weight: 300;
  font-size: clamp(18px, 2.2vw, 30px); letter-spacing: 0.02em; color: var(--cream);
}
.marquee-item .ital { font-style: italic; color: var(--champagne); }
.marquee-item .dot { width: 4px; height: 4px; background: var(--clay-soft); border-radius: 50%; display: inline-block; }
@keyframes marquee-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ------------------------------------------------------------
   Reveal on scroll
   ------------------------------------------------------------ */
@keyframes revealIn { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
.reveal { opacity: 0; transform: translateY(28px); will-change: opacity, transform; }
.reveal.in { animation: revealIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.reveal.d1.in { animation-delay: 0.06s; }
.reveal.d2.in { animation-delay: 0.12s; }
.reveal.d3.in { animation-delay: 0.18s; }
.reveal.d4.in { animation-delay: 0.24s; }
.reveal.d5.in { animation-delay: 0.30s; }

@keyframes slideUp { from { transform: translateY(110%); } to { transform: translateY(0); } }
.line-mask { display: block; overflow: hidden; padding-bottom: 0.14em; margin-bottom: -0.02em; }
.reveal-slide { display: block; transform: translateY(110%); will-change: transform; }
.reveal-slide.in { animation: slideUp 1.15s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.reveal-slide.d1.in { animation-delay: 0.08s; }
.reveal-slide.d2.in { animation-delay: 0.22s; }
.reveal-slide.d3.in { animation-delay: 0.36s; }

/* ------------------------------------------------------------
   Type utilities
   ------------------------------------------------------------ */
.eyebrow {
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.30em; text-transform: uppercase; color: #ffffff;
  text-shadow: 0 1px 14px rgba(0, 0, 0, 0.55);
}
.eyebrow .dash {
  display: inline-block; width: 28px; height: 1px; background: var(--cream-3);
  vertical-align: middle; margin-right: 18px; transform: translateY(-2px);
}
.italic { font-style: italic; }

/* ------------------------------------------------------------
   Nav
   ------------------------------------------------------------ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100; isolation: isolate;
  padding: 22px var(--gutter);
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.5s ease, backdrop-filter 0.5s ease, padding 0.5s ease, box-shadow 0.5s ease, border-color 0.5s ease;
}
.nav.scrolled {
  background: linear-gradient(135deg, rgba(46, 29, 18, 0.88) 0%, rgba(13, 11, 9, 0.92) 100%);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  padding: 14px var(--gutter);
  border-bottom: 1px solid rgba(195, 166, 120, 0.20);
  box-shadow: 0 8px 40px rgba(8, 6, 4, 0.45);
}
.nav.over-media {
  background: linear-gradient(135deg, rgba(46, 29, 18, 0.90) 0%, rgba(13, 11, 9, 0.93) 100%);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(195, 166, 120, 0.18);
  box-shadow: 0 8px 40px rgba(8, 6, 4, 0.4);
}
.nav.over-media .nav-links a,
.nav.over-media .nav-mark .mark-name { color: #ffffff; text-shadow: 0 1px 14px rgba(0,0,0,0.55); }
.nav.over-media .nav-mark .mark-glyph { color: #f0d9b8; }
.nav.over-media .nav-mark .mark-name small { color: rgba(255,255,255,0.85); }
.nav.over-media .theme-toggle { color: #1a1712; background: rgba(244, 238, 226, 0.95); border-color: rgba(255, 255, 255, 0.55); }
.nav-mark { display: flex; align-items: center; gap: 12px; line-height: 1; }
.nav-mark .mark-glyph {
  font-family: var(--display); font-style: italic; font-size: 26px; color: var(--champagne);
  transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
}
.nav-mark:hover .mark-glyph { transform: rotate(-8deg) scale(1.08); }
.nav-mark .mark-name {
  font-family: var(--display); font-weight: 400; font-size: 19px; letter-spacing: 0.06em; color: var(--cream);
}
.nav-mark .mark-name small {
  display: block; font-family: var(--sans); font-size: 8px; font-weight: 400;
  letter-spacing: 0.42em; text-transform: uppercase; color: var(--cream-3); margin-top: 3px;
}
.nav-links { display: flex; gap: 38px; font-size: 11px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--cream-2); }
.nav-links a { position: relative; padding: 6px 0; transition: color 0.3s ease; }
.nav-links a::after {
  content: ""; position: absolute; left: 0; bottom: 0; width: 0; height: 1px;
  background: var(--champagne); transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
}
.nav-links a:hover { color: var(--cream); }
.nav-links a:hover::after { width: 100%; }

.nav-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.nav-mark { min-width: 0; }
.theme-toggle {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid rgba(195, 166, 120, 0.45);
  background: rgba(244, 238, 226, 0.92);
  color: #1a1712;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.4s ease, background 0.4s ease, transform 0.4s ease;
}
.theme-toggle svg { width: 17px; height: 17px; }
.theme-toggle:hover { background: #fff; border-color: var(--champagne); transform: rotate(12deg); }

.nav-burger {
  display: none; width: 36px; height: 36px; border: 0; background: transparent; cursor: pointer;
  padding: 9px; margin-left: 4px; flex-direction: column; justify-content: center; gap: 5px; flex-shrink: 0;
}
.nav-burger span {
  display: block; width: 100%; height: 1.5px; background: var(--cream-2); border-radius: 2px;
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease, background 0.4s ease;
}
.nav.menu-open .nav-burger span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav.menu-open .nav-burger span:nth-child(2) { opacity: 0; }
.nav.menu-open .nav-burger span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

.nav-mobile {
  display: none; position: absolute; top: 100%; left: 0; right: 0; flex-direction: column;
  background: linear-gradient(135deg, rgba(46,29,18,0.97) 0%, rgba(13,11,9,0.98) 100%);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(195,166,120,0.22); box-shadow: 0 22px 50px rgba(8,6,4,0.5);
  padding: 6px var(--gutter) 22px; opacity: 0; transform: translateY(-12px); pointer-events: none;
  transition: opacity 0.35s ease, transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.nav-mobile a {
  font-family: var(--display); font-size: 21px; font-weight: 300; letter-spacing: 0.04em;
  color: #f2ebdb; padding: 15px 2px; border-bottom: 1px solid rgba(195,166,120,0.12);
}
.nav-mobile a:last-child { border-bottom: 0; }

@media (max-width: 820px) {
  .nav-links { display: none; }
  .nav-burger { display: flex; }
  .nav-mobile { display: flex; }
  .nav.menu-open .nav-mobile { opacity: 1; transform: translateY(0); pointer-events: auto; }
}

/* ------------------------------------------------------------
   Hero
   ------------------------------------------------------------ */
.hero { position: relative; min-height: 100vh; padding: 0; display: flex; align-items: center; overflow: hidden; }
.hero-overlay {
  position: absolute; inset: 0; z-index: 1;
  background:
    /* scrim de topo: dá contraste para menu/credenciais sem escurecer o meio */
    linear-gradient(180deg, rgba(8,5,3,0.72) 0%, rgba(8,5,3,0.30) 20%, transparent 38%),
    radial-gradient(ellipse at 76% 30%, rgba(158, 104, 62, 0.38) 0%, transparent 56%),
    radial-gradient(ellipse at 8% 72%, rgba(92, 58, 35, 0.38) 0%, transparent 60%),
    linear-gradient(163deg, rgba(30, 21, 14, 0.46) 0%, rgba(20, 14, 10, 0.44) 45%, rgba(9, 6, 4, 0.82) 100%);
}
.hero-bg-noise {
  position: absolute; inset: 0; z-index: 4; opacity: 0.30; mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.93 0 0 0 0 0.9 0 0 0 0 0.85 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}
.hero-watermark {
  position: absolute; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center;
  pointer-events: none; overflow: hidden;
}
.hero-watermark .glyph {
  font-family: var(--display); font-style: italic; font-size: clamp(360px, 62vw, 820px);
  line-height: 1; color: var(--champagne); opacity: 0.035; user-select: none;
  transform: translateY(4%);
}
.hero-content {
  position: relative; z-index: 2; max-width: var(--page-max); margin: 0 auto; width: 100%; min-width: 0;
  padding: clamp(92px, 13vh, 140px) var(--gutter) clamp(40px, 6vh, 80px);
}
.hero-eyebrow { margin-bottom: 34px; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
.hero-credentials {
  display: flex; align-items: center; flex-wrap: wrap; gap: 8px 14px;
  font-family: var(--sans); font-size: 10px; font-weight: 500; letter-spacing: 0.30em;
  text-transform: uppercase; color: #ffffff; margin-bottom: clamp(20px, 4vh, 34px);
  text-shadow: 0 1px 14px rgba(0, 0, 0, 0.55);
}
.hero-credentials::before {
  content: ''; display: block; flex-shrink: 0; width: 28px; height: 1px;
  background: linear-gradient(90deg, var(--champagne), transparent); opacity: 0.7;
}
.hero-credentials .cred-sep { color: var(--clay-soft); opacity: 0.8; }

.hero-title {
  font-family: var(--display); font-weight: 400; font-optical-sizing: none;
  font-variation-settings: "opsz" 18, "wght" 400;
  font-size: clamp(44px, min(9.6vw, 12vh), 150px); line-height: 1.06; letter-spacing: -0.035em;
  color: var(--cream); margin-bottom: 26px;
}
.hero-title .line {
  display: block; padding-bottom: 0.16em;
  background: linear-gradient(90deg, var(--cream) 0%, var(--cream) 30%, #f4e6c6 50%, var(--cream) 70%, var(--cream) 100%);
  background-size: 250% auto; -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; animation: text-shimmer 9s ease-in-out infinite;
}
.hero-title .accent-inline {
  font-style: italic; font-weight: 400; font-optical-sizing: none; font-variation-settings: "opsz" 18, "wght" 400;
  background: linear-gradient(90deg, var(--clay-soft) 0%, var(--clay-soft) 30%, var(--champagne) 50%, var(--clay-soft) 70%, var(--clay-soft) 100%);
  background-size: 250% auto; -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; animation: text-shimmer 9s ease-in-out infinite;
}
@keyframes text-shimmer { 0% { background-position: 150% center; } 50% { background-position: -50% center; } 100% { background-position: 150% center; } }

.hero-meta {
  display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: end;
  margin-top: clamp(28px, 5vh, 72px); padding-top: clamp(16px, 3vh, 32px);
  border-top: 1px solid rgba(236, 228, 213, 0.10);
}
.hero-tagline {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  font-size: clamp(18px, 1.8vw, 25px); line-height: 1.4; color: #ffffff; max-width: 480px;
  text-shadow: 0 1px 16px rgba(0, 0, 0, 0.5);
}
.hero-tagline em { color: #f0d9b8; font-style: italic; }
.hero-cta {
  display: inline-flex; align-items: center; gap: 12px; margin-top: 26px;
  font-family: var(--sans); font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
  color: #ffffff; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.55);
  transition: gap 0.4s ease, color 0.3s ease, border-color 0.4s ease;
  text-shadow: 0 1px 14px rgba(0, 0, 0, 0.5);
}
.hero-cta:hover { gap: 18px; color: var(--champagne); border-color: var(--champagne); }
.hero-cta .arrow { width: 16px; height: 1px; background: currentColor; position: relative; }
.hero-cta .arrow::after {
  content: ""; position: absolute; right: 0; top: 50%; width: 6px; height: 6px;
  border-right: 1px solid currentColor; border-top: 1px solid currentColor; transform: translate(2px,-50%) rotate(45deg);
}

.hero-aside { display: flex; flex-direction: column; align-items: flex-end; gap: 26px; }
.scroll-cue { display: flex; flex-direction: column; align-items: flex-end; gap: 14px; font-size: 10px; letter-spacing: 0.34em; text-transform: uppercase; color: #ffffff; text-shadow: 0 1px 14px rgba(0,0,0,0.5); }
.scroll-cue .bar { position: relative; width: 1px; height: 56px; background: rgba(236,228,213,0.18); overflow: hidden; }
.scroll-cue .bar::after {
  content: ""; position: absolute; top: -56px; left: 0; width: 1px; height: 56px;
  background: var(--champagne); animation: scrollCue 2.4s cubic-bezier(0.65,0,0.35,1) infinite;
}
@keyframes scrollCue { 0% { transform: translateY(0); } 60% { transform: translateY(112px); } 100% { transform: translateY(112px); } }

@media (max-width: 720px) {
  .hero-meta { grid-template-columns: 1fr; gap: 24px; }
  .hero-aside { align-items: flex-start; gap: 18px; }
  .scroll-cue { flex-direction: row; align-items: center; }
  .scroll-cue .bar { width: 56px; height: 1px; }
}
@media (max-width: 760px) {
  .hero { align-items: flex-start; }
  .hero-content { padding-top: clamp(116px, 17vh, 150px); }
  .eyebrow { white-space: normal; line-height: 1.7; }
  .eyebrow .dash { display: none; }
  .hero-eyebrow { margin-bottom: 26px; }
  .hero-title { font-size: clamp(33px, 9vw, 52px); }
  /* credenciais enxutas no mobile: nome e "Residencial & Interiores" já estão na navbar */
  .hero-credentials { display: block; font-size: 10px; letter-spacing: 0.18em; }
  .hero-credentials::before { display: none; }
  .cred-hide { display: none; }
  .hero-tagline { max-width: 100%; }
}

/* ------------------------------------------------------------
   Section base
   ------------------------------------------------------------ */
.section { position: relative; padding: clamp(80px, 12vw, 160px) var(--gutter); }
.section-inner { max-width: var(--page-max); margin: 0 auto; width: 100%; }
.section-head { display: grid; grid-template-columns: 1fr 2fr; gap: 80px; align-items: end; margin-bottom: 76px; }
.section-head .head-left { display: flex; flex-direction: column; gap: 22px; }
.section-title {
  font-family: var(--display); font-weight: 300; font-size: clamp(38px, 5.4vw, 82px);
  line-height: 1.02; letter-spacing: -0.025em; color: var(--cream);
}
.section-title em { font-style: italic; color: var(--champagne); }
.section-lead {
  font-family: var(--serif); font-style: italic; font-weight: 300; font-size: clamp(18px, 1.5vw, 22px);
  line-height: 1.55; color: var(--cream-2); max-width: 540px;
}
@media (max-width: 880px) { .section-head { grid-template-columns: 1fr; gap: 30px; margin-bottom: 54px; } }

.divider { border: 0; border-top: 1px solid rgba(236,228,213,0.09); }

/* ------------------------------------------------------------
   Sobre
   ------------------------------------------------------------ */
.sobre { position: relative; z-index: 1; }
.sobre-grid { display: grid; grid-template-columns: 1.15fr 1fr; gap: clamp(40px, 6vw, 90px); align-items: start; }
.sobre-text p { font-size: 15px; line-height: 1.85; color: var(--cream-2); margin-bottom: 22px; font-weight: 300; }
.sobre-text p:first-of-type {
  font-family: var(--serif); font-size: clamp(20px, 1.8vw, 26px); line-height: 1.5;
  font-style: italic; color: var(--cream); margin-bottom: 30px;
}
.dropcap::first-letter {
  font-family: var(--display); font-weight: 400; font-optical-sizing: none;
  font-variation-settings: "opsz" 26, "wght" 400; font-size: 5.2em; float: left;
  line-height: 0.82; margin: 0.05em 0.12em 0 0; color: var(--champagne); font-style: italic;
}
.sobre-portrait { position: relative; }
.sobre-portrait .img-placeholder { aspect-ratio: 4 / 5; }
.sobre-portrait img { width: 100%; aspect-ratio: 4/5; object-fit: cover; }
.sobre-portrait .cap {
  margin-top: 14px; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--cream-3);
}
.sobre-stats {
  grid-column: 1 / -1; margin-top: 20px; padding-top: 40px;
  border-top: 1px solid rgba(195, 166, 120, 0.22);
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
}
.stat .num {
  font-family: var(--serif); font-weight: 300; font-size: clamp(40px, 4.5vw, 60px);
  line-height: 1; color: var(--champagne); letter-spacing: -0.02em;
}
.stat .num em { color: var(--clay-soft); font-style: italic; }
.stat .label { margin-top: 12px; font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--cream-3); }
@media (max-width: 880px) {
  .sobre-grid { grid-template-columns: 1fr; }
  .sobre-stats { gap: 16px; }
  .stat .num { font-size: 36px; }
}

/* ------------------------------------------------------------
   Image placeholder
   ------------------------------------------------------------ */
.img-placeholder {
  position: relative; overflow: hidden; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(236, 228, 213, 0.07);
  background:
    repeating-linear-gradient(135deg, rgba(236,228,213,0.025) 0px, rgba(236,228,213,0.025) 1px, transparent 1px, transparent 14px),
    linear-gradient(135deg, var(--ink-2) 0%, var(--ink-3) 60%, var(--ink-2) 100%);
}
.img-placeholder::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 30%, rgba(195, 166, 120, 0.08) 0%, transparent 55%);
}
.img-placeholder .label {
  position: relative; z-index: 2; font-family: "Courier New", monospace; font-size: 10px;
  letter-spacing: 0.24em; text-transform: uppercase; color: rgba(236, 228, 213, 0.4);
  text-align: center; padding: 16px; line-height: 1.8;
}
.img-placeholder .label::before { content: "["; margin-right: 6px; color: rgba(195, 166, 120, 0.45); }
.img-placeholder .label::after  { content: "]"; margin-left: 6px; color: rgba(195, 166, 120, 0.45); }

/* ------------------------------------------------------------
   Processo
   ------------------------------------------------------------ */
.processo { position: relative; z-index: 1; }
.processo-list { display: flex; flex-direction: column; }
.processo-item {
  display: grid; grid-template-columns: 90px 1fr 1.3fr; gap: 40px; align-items: baseline;
  padding: 40px 0; border-top: 1px solid rgba(236, 228, 213, 0.10);
  transition: background 0.5s ease;
}
.processo-item:last-child { border-bottom: 1px solid rgba(236, 228, 213, 0.10); }
.processo-item:hover { background: linear-gradient(90deg, rgba(95,63,39,0.10), transparent 70%); }
.processo-num { font-family: var(--display); font-style: italic; font-size: 30px; color: var(--champagne); line-height: 1; }
.processo-name { font-family: var(--display); font-weight: 300; font-size: clamp(24px, 3vw, 38px); line-height: 1.05; letter-spacing: -0.02em; color: var(--cream); }
.processo-desc { font-size: 14px; line-height: 1.75; color: var(--cream-3); max-width: 460px; }
@media (max-width: 780px) {
  .processo-item { grid-template-columns: 1fr; gap: 12px; padding: 30px 0; }
}

/* ------------------------------------------------------------
   Projetos — carrossel tela cheia (foto inteira)
   ------------------------------------------------------------ */
.projetos { position: relative; z-index: 1; }
.carousel {
  position: relative; width: 100vw; margin-left: calc(50% - 50vw);
  height: 100vh; min-height: 560px; max-height: 1000px; overflow: hidden; background: #0c0906;
}
.carousel-stack { position: absolute; inset: 0; }
.carousel-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.1s ease; }
.carousel-slide.active { opacity: 1; z-index: 1; }
/* fundo desfocado da própria foto — preenche as bordas quando a foto é "inteira" (contain) */
.carousel-slide .slide-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(34px) brightness(0.4); transform: scale(1.15); z-index: 0; }
.carousel-slide .slide-img { position: relative; z-index: 1; width: 100%; height: 100%; object-fit: contain; display: block; transform: scale(1.04); transition: transform 6s ease-out; }
.carousel-slide.active .slide-img { transform: scale(1); }
.carousel-slide .img-placeholder { position: absolute; inset: 0; width: 100%; height: 100%; }
.carousel-scrim {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background:
    linear-gradient(to top, rgba(8,5,3,0.85) 0%, rgba(8,5,3,0.35) 26%, rgba(8,5,3,0) 52%),
    linear-gradient(to bottom, rgba(8,5,3,0.5) 0%, rgba(8,5,3,0) 22%);
}
.carousel-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 60px; height: 60px; border-radius: 50%;
  border: 1px solid rgba(195,166,120,0.5); background: rgba(20,14,10,0.25);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); color: #f3ecdd;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease, transform 0.4s ease; z-index: 4;
}
.carousel-arrow svg { width: 22px; height: 22px; transition: transform 0.4s ease; }
.carousel-arrow:hover { background: rgba(195,166,120,0.95); border-color: var(--champagne); color: #221a10; transform: translateY(-50%) scale(1.07); }
.carousel-arrow.prev { left: clamp(16px, 3vw, 44px); }
.carousel-arrow.next { right: clamp(16px, 3vw, 44px); }
.carousel-arrow.prev:hover svg { transform: translateX(-3px); }
.carousel-arrow.next:hover svg { transform: translateX(3px); }
.carousel-title { position: absolute; left: var(--gutter); bottom: 12vh; z-index: 3; max-width: 80%; text-shadow: 0 2px 24px rgba(0,0,0,0.55); }
.carousel-num { display: block; font-family: var(--display); font-style: italic; font-weight: 300; color: var(--champagne); font-size: 24px; margin-bottom: 6px; }
.carousel-name { font-family: var(--display); font-weight: 300; font-size: clamp(40px, 6vw, 92px); line-height: 0.98; letter-spacing: -0.02em; color: #f6efdf; margin: 0; }
.carousel-desc { margin: 16px 0 0; max-width: 440px; font-size: 15px; line-height: 1.6; color: #dcd3c4; }
.carousel-dots { position: absolute; right: var(--gutter); bottom: calc(12vh + 8px); display: flex; gap: 9px; z-index: 3; }
.carousel-dots .dot { width: 8px; height: 8px; padding: 0; border-radius: 50%; border: none; background: rgba(236,228,213,0.35); cursor: pointer; transition: width 0.3s, background 0.3s, border-radius 0.3s; }
.carousel-dots .dot.active { width: 26px; border-radius: 4px; background: var(--champagne); }
@media (max-width: 880px) {
  .carousel-arrow { width: 48px; height: 48px; }
  .carousel-arrow svg { width: 18px; height: 18px; }
  .carousel-name { font-size: clamp(32px, 11vw, 60px); }
  .carousel-title { bottom: 17vh; max-width: calc(100% - 2 * var(--gutter)); }
  .carousel-dots { left: var(--gutter); right: var(--gutter); bottom: 9vh; justify-content: center; }
  /* No celular a foto preenche a tela (evita muito espaço escuro com fotos deitadas) */
  .carousel-slide .slide-img { object-fit: cover; transform: scale(1); }
  .carousel-slide.active .slide-img { transform: scale(1); }
}

/* ------------------------------------------------------------
   Escritos (blog)
   ------------------------------------------------------------ */
.escritos { position: relative; z-index: 1; }
.blog-list { display: flex; flex-direction: column; border-top: 1px solid rgba(236,228,213,0.10); }
.blog-item {
  display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: baseline;
  padding: 30px 0; border-bottom: 1px solid rgba(236,228,213,0.10);
  transition: padding-left 0.5s cubic-bezier(0.16,1,0.3,1), background 0.5s ease;
}
.blog-item:hover { padding-left: 20px; background: linear-gradient(90deg, rgba(95,63,39,0.10), transparent 70%); }
.blog-item h3 { font-family: var(--display); font-weight: 300; font-size: clamp(21px, 2.4vw, 30px); letter-spacing: -0.01em; margin-bottom: 8px; color: var(--cream); }
.blog-item p { color: var(--cream-3); font-size: 14px; max-width: 62ch; line-height: 1.6; }
.blog-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; white-space: nowrap; }
.blog-date { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--cream-3); }
.blog-item a.read { font-family: var(--sans); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--champagne); display: inline-flex; align-items: center; gap: 8px; }
.blog-item a.read .arrow { width: 16px; height: 1px; background: currentColor; position: relative; transition: width 0.4s ease; }
.blog-item a.read:hover .arrow { width: 26px; }
.blog-item a.read .arrow::after { content: ""; position: absolute; right: 0; top: 50%; width: 5px; height: 5px; border-right: 1px solid currentColor; border-top: 1px solid currentColor; transform: translate(2px,-50%) rotate(45deg); }
@media (max-width: 700px) {
  .blog-item { grid-template-columns: 1fr; gap: 14px; }
  .blog-right { align-items: flex-start; }
}

/* ------------------------------------------------------------
   Contato
   ------------------------------------------------------------ */
.contato { position: relative; z-index: 1; }
.contato::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 50% 30%, rgba(95, 63, 39, 0.28) 0%, transparent 60%);
}
.contato-inner { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; text-align: center; }
.contato-eyebrow { margin-bottom: 30px; justify-content: center; }
.contato-title { font-family: var(--display); font-weight: 300; font-size: clamp(44px, 7vw, 104px); line-height: 1; letter-spacing: -0.035em; color: var(--cream); margin-bottom: 30px; }
.contato-title em { font-style: italic; color: var(--champagne); }
.contato-lead { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: clamp(18px, 1.8vw, 24px); line-height: 1.55; color: var(--cream-2); max-width: 620px; margin: 0 auto 54px; }
.whatsapp-cta {
  display: inline-flex; align-items: center; gap: 20px; padding: 26px 48px;
  color: #f3ecdd; border: 1px solid rgba(195, 166, 120, 0.6);
  background: linear-gradient(135deg, var(--clay-mid) 0%, var(--clay-deep) 100%);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 14px 40px rgba(0, 0, 0, 0.45);
  font-family: var(--sans); font-size: 12px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase;
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.5s ease, box-shadow 0.5s ease, transform 0.5s ease;
}
.whatsapp-cta::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(195,166,120,0.18), transparent);
  transform: translateX(-100%); transition: transform 0.8s cubic-bezier(0.16,1,0.3,1);
}
.whatsapp-cta:hover {
  border-color: rgba(195, 166, 120, 0.9); transform: translateY(-2px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 18px 50px rgba(0,0,0,0.5), 0 0 40px rgba(195,166,120,0.22);
}
.whatsapp-cta:hover::before { transform: translateX(100%); }
.wa-badge {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(195, 166, 120, 0.16); border: 1px solid rgba(195, 166, 120, 0.45);
  transition: background 0.4s ease, border-color 0.4s ease;
}
.whatsapp-cta:hover .wa-badge { background: rgba(195, 166, 120, 0.28); border-color: rgba(195, 166, 120, 0.75); }
.wa-badge .wa-icon { width: 16px; height: 16px; fill: currentColor; }
.whatsapp-cta .arrow { width: 18px; height: 1px; background: currentColor; position: relative; }
.whatsapp-cta .arrow::after { content: ""; position: absolute; right: 0; top: 50%; width: 6px; height: 6px; border-right: 1px solid currentColor; border-top: 1px solid currentColor; transform: translate(2px,-50%) rotate(45deg); }
.contato-secondary {
  margin-top: 76px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px;
  padding-top: 54px; border-top: 1px solid rgba(195, 166, 120, 0.2); text-align: left;
}
.contato-block .block-label { font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--cream-3); margin-bottom: 14px; }
.contato-block .block-value { font-family: var(--serif); font-weight: 300; font-size: 20px; line-height: 1.4; color: var(--cream); }
.contato-block a.block-value { transition: color 0.3s ease; }
.contato-block a.block-value:hover { color: var(--champagne); }
.contato-block .block-sub { margin-top: 6px; font-size: 13px; color: var(--cream-3); }
@media (max-width: 720px) { .contato-secondary { grid-template-columns: 1fr; gap: 28px; } }

/* ------------------------------------------------------------
   Footer
   ------------------------------------------------------------ */
.footer {
  padding: 46px var(--gutter) 36px; position: relative; z-index: 1;
  border-top: 1px solid rgba(195, 166, 120, 0.18);
  background: radial-gradient(ellipse at 50% 0%, rgba(195, 166, 120, 0.07) 0%, transparent 60%);
}
.footer-inner { max-width: var(--page-max); margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap; }
.footer-logo { font-family: var(--serif); font-size: 14px; letter-spacing: 0.24em; color: var(--cream-2); }
.footer-mini { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--cream-3); }
.footer-social { display: inline-flex; align-items: center; gap: 9px; font-family: var(--sans); font-size: 11px; letter-spacing: 0.14em; color: var(--cream-3); transition: color 0.4s cubic-bezier(0.16,1,0.3,1); }
.footer-social svg { width: 17px; height: 17px; display: block; }
.footer-social svg.wa-icon { fill: currentColor; }
.footer-social:hover { color: var(--champagne); }
.footer-social-group { display: inline-flex; align-items: center; gap: 24px; flex-wrap: wrap; }
@media (max-width: 560px) { .footer-inner { justify-content: center; text-align: center; } }

/* ------------------------------------------------------------
   Ambient glow — fixo, atrás de toda a página
   ------------------------------------------------------------ */
.ambient-glow { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.ag-orb { position: absolute; border-radius: 50%; will-change: transform, opacity; }
.ag-orb-1 {
  width: 900px; height: 900px; top: -30%; left: 50%; transform: translateX(-50%);
  background: radial-gradient(circle, rgba(120, 78, 48, 1) 0%, rgba(67, 44, 27, 0.6) 40%, transparent 70%);
  filter: blur(60px); opacity: 0.4; animation: agPulse1 8s ease-in-out infinite;
}
.ag-orb-2 {
  width: 700px; height: 700px; top: 30%; left: -15%;
  background: radial-gradient(circle, rgba(95, 63, 39, 1) 0%, transparent 65%);
  filter: blur(80px); opacity: 0.38; animation: agPulse2 11s ease-in-out infinite; animation-delay: -4s;
}
.ag-orb-3 {
  width: 680px; height: 680px; bottom: 5%; right: -8%;
  background: radial-gradient(circle, rgba(195, 166, 120, 0.9) 0%, rgba(195, 166, 120, 0.4) 35%, transparent 65%);
  filter: blur(70px); opacity: 0.34; animation: agPulse3 14s ease-in-out infinite; animation-delay: -8s;
}
@keyframes agPulse1 { 0%,100% { opacity: 0.5; transform: translateX(-50%) scale(1); } 50% { opacity: 0.7; transform: translateX(-50%) scale(1.08); } }
@keyframes agPulse2 { 0%,100% { opacity: 0.38; transform: translate(0,0) scale(1); } 50% { opacity: 0.52; transform: translate(4%,6%) scale(1.06); } }
@keyframes agPulse3 { 0%,100% { opacity: 0.34; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.12); } }
/* No mobile: menos orbs e blur menor (mais leve, melhor bateria/desempenho) */
@media (max-width: 760px) {
  .ag-orb-1 { width: 460px; height: 460px; filter: blur(46px); }
  .ag-orb-2, .ag-orb-3 { display: none; }
}

/* ------------------------------------------------------------
   Reduced motion
   ------------------------------------------------------------ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  .reveal, .reveal-slide { opacity: 1 !important; transform: none !important; }
}

/* ------------------------------------------------------------
   Transição de tema
   ------------------------------------------------------------ */
.theme-transitioning, .theme-transitioning *, .theme-transitioning *::before, .theme-transitioning *::after {
  transition: background-color 0.55s ease, background 0.55s ease, color 0.45s ease, border-color 0.45s ease, box-shadow 0.5s ease, opacity 0.5s ease !important;
}

/* ============================================================
   Modo Claro — travertino / luz do dia
   ============================================================ */
[data-theme="light"] {
  --ink-0: #f5efe2;
  --ink-1: #ede6d5;
  --ink-2: #e2dac7;
  --ink-3: #d6cdb7;
  --cream:   #211a13;
  --cream-2: #4c4030;
  --cream-3: #8a7d68;
  --clay-deep: #6a4326;
  --clay:      #7a4e2c;
  --clay-mid:  #8a5a34;
  --clay-soft: #a5603a;
  --champagne: #8a6a3c;
  --bronze: #5c4428;
}
[data-theme="light"] ::selection { background: rgba(122, 78, 44, 0.16); color: #211a13; }
[data-theme="light"] .nav.scrolled {
  background: linear-gradient(135deg, rgba(226, 216, 196, 0.92) 0%, rgba(245, 239, 226, 0.94) 100%);
  border-bottom: 1px solid rgba(138, 106, 60, 0.28);
  box-shadow: 0 8px 40px rgba(150, 120, 70, 0.18);
}
/* Enquanto o hero (marrom) aparece, a navbar continua marrom mesmo no tema claro.
   Precisa vir DEPOIS de .nav.scrolled acima para vencer no trecho de sobreposição. */
[data-theme="light"] .nav.over-media {
  background: linear-gradient(135deg, rgba(46, 29, 18, 0.90) 0%, rgba(13, 11, 9, 0.93) 100%);
  border-bottom: 1px solid rgba(195, 166, 120, 0.18);
  box-shadow: 0 8px 40px rgba(8, 6, 4, 0.4);
}
[data-theme="light"] .nav-links a { color: #4c4030; }
[data-theme="light"] .nav-links a:hover { color: #211a13; }
[data-theme="light"] .nav-mobile {
  background: linear-gradient(135deg, rgba(226,216,196,0.98) 0%, rgba(245,239,226,0.98) 100%);
  border-bottom-color: rgba(138,106,60,0.18); box-shadow: 0 22px 50px rgba(150,120,70,0.2);
}
[data-theme="light"] .nav-mobile a { color: #2a2013; border-bottom-color: rgba(138,106,60,0.14); }
[data-theme="light"] .marquee { background-color: var(--ink-1); }
[data-theme="light"] .img-placeholder {
  background:
    repeating-linear-gradient(135deg, rgba(60,44,26,0.03) 0px, rgba(60,44,26,0.03) 1px, transparent 1px, transparent 14px),
    linear-gradient(135deg, var(--ink-2) 0%, var(--ink-3) 60%, var(--ink-2) 100%);
  border-color: rgba(60,44,26,0.10);
}
[data-theme="light"] .ag-orb-1 { opacity: 0.22; }
[data-theme="light"] .ag-orb-2 { opacity: 0.16; }
[data-theme="light"] .ag-orb-3 { opacity: 0.20; }
[data-theme="light"] .whatsapp-cta { color: #f5efe2; }
[data-theme="light"] .hero-watermark .glyph { opacity: 0.06; }
</style>
